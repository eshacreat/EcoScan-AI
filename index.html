<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Scan AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --green-900: #040a06;
            --green-800: #0b1f14;
            --green-700: #1b4332;
            --green-600: #2d6a4f;
            --green-500: #40916c;
            --green-400: #52b788;
            --green-300: #74c69d;
            --green-200: #95d5b2;
            --green-100: #b7e4c7;
            --white: #ffffff;
            --warn-dim: rgba(240, 230, 200, 0.5);
        }

        body { 
            margin: 0; font-family: 'Manrope', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; background: var(--green-900); color: var(--white);
        }
        body::before {
            content: ""; position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1920&q=80') center/cover;
            filter: brightness(0.55) contrast(1.05); z-index: -2;
        }
        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(4, 10, 6, 0.85) 100%); z-index: -1;
            pointer-events: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px); border-radius: 28px; padding: 50px 45px; 
            border: 1px solid rgba(255, 255, 255, 0.06); text-align: center; width: 450px;
            box-shadow: 0 40px 90px rgba(0,0,0,0.5);
        }
        h1 { font-size: clamp(2.2rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 12px; }
        h1 span { color: var(--green-400); }
        .tagline { font-size: 14px; color: rgba(255, 255, 255, 0.6); font-weight: 400; line-height: 1.6; margin-bottom: 40px; }
        
        input {
            padding: 16px 20px; width: 100%; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: 16px; outline: none; font-size: 15px; background: rgba(0, 0, 0, 0.3); color: var(--white);
            text-align: center; transition: all 0.3s ease;
        }
        input:focus { border-color: var(--green-400); background: rgba(0, 0, 0, 0.45); }
        
        button, .btn-link {
            background: linear-gradient(135deg, var(--green-700) 0%, var(--green-600) 100%); color: var(--white); 
            border: 1px solid rgba(82, 183, 136, 0.15); padding: 16px; border-radius: 14px; 
            cursor: pointer; font-size: 13px; font-weight: 700; letter-spacing: 1px; width: 100%; 
            text-transform: uppercase; box-shadow: 0 12px 30px rgba(45, 106, 79, 0.2); transition: all 0.3s ease;
            display: block; text-decoration: none;
        }
        button:hover, .btn-link:hover { filter: brightness(1.15); transform: translateY(-2px); box-shadow: 0 15px 35px rgba(45, 106, 79, 0.35); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        const jokes = ["Scanning for digital dust bunnies...", "Measuring the weight of your pixels...", "Watering the digital trees..."];
        let jokeIndex = 0;
        function rotateJokes() {
            const jokeElement = document.getElementById('loading-joke');
            if (jokeElement) {
                jokeElement.innerText = jokes[jokeIndex];
                jokeIndex = (jokeIndex + 1) % jokes.length;
            }
        }
        function showLoading() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setInterval(rotateJokes, 3000);
        }
    </script>
</head>
<body>
    <div class="vignette"></div>
    
    <div id="loader" style="display:none; text-align:center;">
        <div style="border: 3px solid rgba(255,255,255,0.06); border-top: 3px solid var(--green-400); border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; margin: 0 auto 24px;"></div>
        <h2 id="loading-joke" style="font-size:20px; font-weight:500; margin-bottom:8px;">Analyzing Digital Footprint</h2>
        <p style="color:rgba(255,255,255,0.4); font-size:13px;">Google engine initializing. This takes 30-60s.</p>
    </div>
    
    <div id="main-card" class="glass-card">
        <h1>Measure<br><span>What Matters.</span></h1>
        <p class="tagline">Real-time environmental infrastructure analysis powered by AI.</p>
        <form action="/scan" method="post" onsubmit="showLoading()">
            <input type="url" name="url" placeholder="https://example.com" required autocomplete="url">
            <button type="submit">Begin Analysis</button>
        </form>
    </div>
</body>
</html>
